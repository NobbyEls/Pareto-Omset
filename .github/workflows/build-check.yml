name: Build Check

# Menjalankan "npm run build" otomatis di server GitHub setiap kali ada
# push atau pull request. Hasilnya muncul sebagai tanda centang (✓/✗)
# di halaman Pull Request — tidak perlu komputer lokal.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (lint)
        run: npm run lint

      - name: Build
        run: npm run build
