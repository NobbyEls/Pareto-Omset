      // Apply saved theme before first paint to avoid theme flash.
      (function () {
        try {
          var t = localStorage.getItem("pareto-theme");

            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
